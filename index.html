<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meridian — Editorial Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin=""></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin=""></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="module">
  (async () => {
    try {
      const WebLLM = await import("https://esm.run/@mlc-ai/web-llm");
      window._WebLLM = WebLLM;
      console.log('WebLLM loaded successfully');
    } catch(e) {
      console.error('WebLLM load failed:', e);
    }
  })();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg1:#111820;--bg2:#141b22;--bg3:#1a2332;
  --text:#f5f0e8;--muted:#7a7570;--dim:#3a3530;
  --amber:#d4a853;--amber2:#9a7a3a;--amber3:#5a4820;
  --border:#1e2832;--border2:#253040;
  --green:#4a9c6d;--green2:#2a5c3d;
  --red:#c0392b;--red2:#7a2020;
}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'Source Serif 4',serif}
button{cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:none;outline:none}
textarea,input,select{font-family:'IBM Plex Mono',monospace;background:var(--bg1);color:var(--text);border:1px solid var(--border2);border-radius:4px;outline:none}
textarea:focus,input:focus,select:focus{border-color:var(--amber2)}
.app{max-width:1000px;margin:0 auto;padding:0 24px 80px}
.header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 20px;border-bottom:1px solid var(--border)}
.logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;letter-spacing:-.02em}
.logo span{color:var(--amber)}
.nav-btn{padding:7px 16px;background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;cursor:pointer;transition:all .2s}
.nav-btn:hover{color:var(--text);border-color:var(--amber2)}
.nav-btn.active{background:var(--bg2);color:var(--amber);border-color:var(--amber2)}
.idle-screen{text-align:center;padding:60px 0}
.idle-screen h1{font-family:'Playfair Display',serif;font-size:42px;font-weight:900;margin-bottom:16px}
.idle-screen h1 em{font-style:italic;color:var(--amber)}
.idle-screen p{color:var(--muted);font-size:16px;max-width:440px;margin:0 auto 24px;line-height:1.7}
.section-card{margin-bottom:20px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;overflow:hidden}
.section-card.active{border-color:var(--amber2)}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.sh-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600}
.sh-status{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--muted)}
.sh-status.running{color:var(--amber)}
.sh-status.complete{color:var(--green)}
.section-body{padding:20px}
.output-area{background:var(--bg1);border:1px solid var(--border);border-radius:4px;padding:20px;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-wrap:break-word;max-height:600px;overflow-y:auto;min-height:80px}
.btn{padding:9px 20px;border-radius:3px;letter-spacing:.08em;transition:all .2s;font-size:11px}
.btn-amber{background:var(--amber);color:#0d1117;font-weight:500;border:none}
.btn-amber:hover{background:#e0b860}
.btn-amber:disabled{background:var(--amber3);color:var(--amber2);cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:var(--amber2)}
.btn-green{background:var(--green2);color:var(--green);border:1px solid var(--green2)}
.btn-green:hover{background:#3a8c5d}
.btn-sm{padding:5px 12px;font-size:10px}
.input-row{margin-bottom:16px}
.input-row label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
.input-row textarea{width:100%;padding:10px 14px;font-size:12px;line-height:1.6;min-height:80px;resize:vertical}
.input-row select{width:100%;padding:9px 12px;font-size:12px}
.controls{display:flex;gap:8px;margin-top:12px}
.loading-row{display:flex;align-items:center;gap:10px;padding:10px 0}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.timer{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.error-card{background:var(--red2);border:1px solid var(--red);border-radius:4px;padding:14px 16px;margin-bottom:12px}
.error-card p{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#ff9080;margin-bottom:10px}
.archive-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-top:4px}
.archive-item{background:var(--bg2);padding:16px 20px;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:space-between}
.archive-item:hover{background:var(--bg3)}
.archive-item-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;margin-bottom:4px}
.archive-item-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TODAY = new Date().toLocaleDateString('en-IN', {
  weekday:'long', year:'numeric', month:'long', day:'numeric'
});

const CEO_PROMPT = `You are the CEO and Editorial Director of The Meridian — a weekly newsletter for curious, mid-20s Indians about travel, culture, and geopolitics.

THE MERIDIAN'S THESIS:
Geopolitics shapes travel. Where people can go, what they find when they arrive, and how destinations transform over time — these are always political stories.

THREE STORY TYPES:
1. ACTIVE GEOPOLITICS × TRAVEL — A current event directly affecting travel right now (visa change, border reopening, conflict reshaping tourism).
2. TRANSFORMATION STORY — A place that went from war/isolation to compelling destination (completed transformation, safe to visit now). Examples: Sarajevo, Rwanda, Vietnam, Tbilisi.
3. EMERGING DESTINATION — Still unsafe/unstable but has potential. Frame as "what could become" using parallels to successful transformations. NOT a travel recommendation.

AUDIENCE: Young Indians aged 22-32. Globally aware, want depth and a point of view. They want to understand the world through places and people.

YOUR JOB TODAY:
Write a COMPLETE newsletter article — 1200-1500 words. Not a plan, not a brief. A finished, publishable article.

Include:
- Compelling opening scene (never a statistic)
- Clear geopolitical × travel angle
- Indian perspective (what it means for Indian travelers or India's relationship with this place)
- Vivid detail and human moments
- Strong point of view — never neutral
- Ending that lands (not a summary)

Today's date: ${TODAY}`;

// News fetch functions
async function fetchDevTo() {
  const url = 'https://dev.to/api/articles?state=fresh&tags=travel,geopolitics,culture&limit=8&sort_by=published_at';
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) return null;
    const data = await r.json();
    const items = (data || []).slice(0, 6).map(a => ({ title: a.title?.trim(), blurb: a.description?.trim() || '' })).filter(i => i.title);
    return items.length ? { name: 'Dev.to', items } : null;
  } catch (_) { clearTimeout(timer); return null; }
}

async function fetchHackerNews() {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try {
    const r = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json?limitToFirst=20', { signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) return null;
    const ids = await r.json();
    const items = [];
    for (const id of ids.slice(0, 6)) {
      try {
        const ir = await fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`, { signal: ctrl.signal });
        if (ir.ok) {
          const item = await ir.json();
          if (item?.title) items.push({ title: item.title.trim(), blurb: '' });
        }
      } catch(_) {}
    }
    return items.length ? { name: 'HackerNews', items } : null;
  } catch (_) { clearTimeout(timer); return null; }
}

async function fetchNews() {
  const settled = await Promise.allSettled([fetchDevTo(), fetchHackerNews()]);
  return settled.map(r => r.value).filter(Boolean);
}

function formatNewsContext(feeds) {
  if (!feeds.length) return null;
  const lines = [];
  for (const feed of feeds) {
    lines.push(`[${feed.name}]`);
    feed.items.forEach(item => lines.push(`• ${item.title}`));
    lines.push('');
  }
  return lines.join('\n').trim();
}

// Stream helper
async function streamCall({ engine, system, messages, onChunk, onDone, onError }) {
  try {
    const allMsgs = [{ role:'system', content:system }, ...messages];
    const stream = await engine.chat.completions.create({
      messages: allMsgs,
      stream: true,
      max_tokens: 1800,
      temperature: 0.7,
    });
    let full = '';
    for await (const chunk of stream) {
      const delta = chunk.choices?.[0]?.delta?.content || '';
      if (delta) { full += delta; onChunk(full); }
      if (chunk.choices?.[0]?.finish_reason === 'stop') { onDone(full); return; }
    }
    onDone(full);
  } catch(err) {
    onError(err.message || 'Generation failed');
  }
}

// Headline extractor
function extractHeadline(text) {
  const m = text.match(/ISSUE DRAFT\s*[—\-]+\s*(.+)|^#+\s*(.+)/m);
  return m ? (m[1] || m[2]).trim() : 'Untitled Issue';
}

// Timer component
function ElapsedTimer({ running }) {
  const [secs, setSecs] = useState(0);
  const startRef = useRef(null);
  useEffect(() => {
    if (!running) { setSecs(0); startRef.current = null; return; }
    startRef.current = Date.now();
    const iv = setInterval(() => setSecs(Math.floor((Date.now() - startRef.current) / 1000)), 1000);
    return () => clearInterval(iv);
  }, [running]);
  if (!running) return null;
  const m = Math.floor(secs / 60), s = secs % 60;
  return <span className="timer">{m > 0 ? `${m}m ${s}s` : `${s}s`}</span>;
}

// Main app
function App() {
  const [engine, setEngine] = useState(null);
  const [modelName, setModelName] = useState('');
  const [activeTab, setActiveTab] = useState('write');

  const [topic, setTopic] = useState('');
  const [storyType, setStoryType] = useState('either');
  const [output, setOutput] = useState('');
  const [status, setStatus] = useState('idle');
  const [error, setError] = useState('');
  const [feedStatus, setFeedStatus] = useState('');

  const [archive, setArchive] = useState(() => {
    try { return JSON.parse(localStorage.getItem('meridian_archive') || '[]'); } catch { return []; }
  });
  const [selectedArchive, setSelectedArchive] = useState(null);

  const outputRef = useRef(null);

  useEffect(() => {
    if (outputRef.current && status === 'running') outputRef.current.scrollTop = outputRef.current.scrollHeight;
  }, [output, status]);

  const onReady = (eng, name) => { setEngine(eng); setModelName(name); };

  const generate = async () => {
    setStatus('running');
    setOutput('');
    setError('');
    setFeedStatus('');

    let newsContext = '';
    setFeedStatus('Fetching live news...');
    try {
      const feeds = await fetchNews();
      if (feeds.length) {
        newsContext = formatNewsContext(feeds);
        setFeedStatus(`✓ Loaded ${feeds.map(f => f.name).join(', ')}`);
      } else {
        setFeedStatus('⚠ Could not fetch feeds — using training knowledge only');
      }
    } catch (_) {
      setFeedStatus('⚠ Could not fetch feeds — using training knowledge only');
    }

    const manualHeadlines = document.getElementById('manual-headlines')?.value?.trim();
    if (manualHeadlines && !newsContext) {
      newsContext = `MANUALLY PROVIDED HEADLINES:\n${manualHeadlines.split('\n').filter(Boolean).map(l => `• ${l.trim()}`).join('\n')}`;
    }

    const typeDir = storyType === 'active'
      ? 'ACTIVE GEOPOLITICAL × TRAVEL story (happening right now, affects travel immediately)'
      : storyType === 'transformation'
      ? 'TRANSFORMATION STORY (place transformed from conflict/isolation to destination, safe to visit now)'
      : storyType === 'emerging'
      ? 'EMERGING DESTINATION story (currently unsafe but has potential, frame as "what could become")'
      : 'whichever story type has the strongest opportunity this week';

    const topicDir = topic.trim()
      ? `\nThe editor has a topic in mind: "${topic}". Build your article around this focus.`
      : '';

    const newsSection = newsContext
      ? `\nCURRENT NEWS CONTEXT (live feeds):\n${newsContext}\n`
      : '\nNote: Live news could not be fetched. Use your training knowledge.\n';

    const userMsg = `Today is ${TODAY}.\n\nWrite a ${typeDir}.${topicDir}${newsSection}\nRemember: This is the FINAL article, ready to publish. Complete, polished, 1200-1500 words. Strong point of view. Opens with a scene, not a statistic. Ends with something that lands.`;

    await streamCall({
      engine,
      system: CEO_PROMPT,
      messages: [{ role: 'user', content: userMsg }],
      onChunk: t => setOutput(t),
      onDone: t => {
        setOutput(t);
        setStatus('complete');
      },
      onError: e => { setStatus('error'); setError(e); },
    });
  };

  const saveIssue = () => {
    const headline = extractHeadline(output);
    const issue = { id: Date.now(), date: TODAY, headline, output };
    const updated = [issue, ...archive];
    setArchive(updated);
    localStorage.setItem('meridian_archive', JSON.stringify(updated));
  };

  const reset = () => {
    setStatus('idle');
    setOutput('');
    setError('');
    setTopic('');
    setFeedStatus('');
  };

  // Model loader
  if (!engine) {
    const [selected, setSelected] = useState('Phi-3.5-mini-instruct-q4f16_1-MLC');
    const [loading, setLoading] = useState(false);
    const [progress, setProgress] = useState(0);
    const [msg, setMsg] = useState('');
    const [libReady, setLibReady] = useState(!!window._WebLLM);

    useEffect(() => {
      if (window._WebLLM) { setLibReady(true); return; }
      const poll = setInterval(() => {
        if (window._WebLLM) { setLibReady(true); clearInterval(poll); }
      }, 200);
      const timeout = setTimeout(() => clearInterval(poll), 15000);
      return () => { clearInterval(poll); clearTimeout(timeout); };
    }, []);

    const load = async () => {
      if (!window._WebLLM) {
        alert('WebLLM not loaded yet. Please wait a moment and refresh.');
        return;
      }
      setLoading(true);
      setMsg('Loading from cache...');
      try {
        const eng = new window._WebLLM.MLCEngine();
        await eng.reload(selected, {
          initProgressCallback: (r) => {
            setProgress(Math.round((r.progress || 0) * 100));
            setMsg(r.text || '');
          }
        });
        localStorage.setItem('meridian_model', selected);
        onReady(eng, selected);
      } catch(e) {
        alert('Failed: ' + e.message);
        setLoading(false);
      }
    };

    return (
      <div className="app">
        <div className="header"><div className="logo">The <span>Meridian</span></div></div>
        <div style={{maxWidth:600,margin:'60px auto',textAlign:'center'}}>
          <h2 style={{fontFamily:'Playfair Display',fontSize:28,fontWeight:700,marginBottom:12}}>Choose your model</h2>
          <p style={{color:'var(--muted)',marginBottom:24,lineHeight:1.6}}>Single-shot newsletter generation. Pick a model and let it rip.</p>
          {[
            ['Phi-3.5-mini-instruct-q4f16_1-MLC','Phi 3.5 Mini','~2.2 GB','Best writing quality'],
            ['Llama-3.2-3B-Instruct-q4f16_1-MLC','Llama 3.2 3B','~1.9 GB','Balanced'],
            ['Llama-3.2-1B-Instruct-q4f16_1-MLC','Llama 3.2 1B','~0.8 GB','Fastest'],
          ].map(([id,name,size,note]) => (
            <div key={id} onClick={() => !loading && setSelected(id)} style={{
              padding:12,margin:'0 0 8px',background: selected===id?'var(--bg3)':'var(--bg2)',
              border: selected===id?'2px solid var(--amber)':'1px solid var(--border)',
              borderRadius:4,cursor:'pointer',transition:'all .2s'
            }}>
              <div style={{fontFamily:'Playfair Display',fontSize:14,fontWeight:600}}>{name}</div>
              <div style={{fontFamily:'IBM Plex Mono',fontSize:10,color:'var(--muted)'}}>{size} · {note}</div>
            </div>
          ))}
          <button className="btn btn-amber" style={{padding:'12px 28px',marginTop:24,fontSize:12}} onClick={load} disabled={!libReady||loading}>
            {loading ? `Loading ${progress}%...` : 'Download & Load'}
          </button>
          {loading && <div style={{fontFamily:'IBM Plex Mono',fontSize:11,color:'var(--muted)',marginTop:12}}>{msg}</div>}
        </div>
      </div>
    );
  }

  // Main UI
  return (
    <div className="app">
      <div className="header">
        <div className="logo">The <span>Meridian</span></div>
        <div style={{display:'flex',gap:8}}>
          <button className={`nav-btn${activeTab==='write'?' active':''}`} onClick={() => setActiveTab('write')}>Write</button>
          <button className={`nav-btn${activeTab==='archive'?' active':''}`} onClick={() => setActiveTab('archive')}>Archive ({archive.length})</button>
        </div>
      </div>

      {activeTab === 'write' && (
        <>
          {status === 'idle' && (
            <div className="idle-screen">
              <h1>Generate this week's <em>Meridian</em></h1>
              <p>One-shot article generation. Live news context. Your story type preference. Done.</p>

              <div style={{maxWidth:520,margin:'40px auto',textAlign:'left'}}>
                <div className="input-row">
                  <label>Story type</label>
                  <select value={storyType} onChange={e => setStoryType(e.target.value)} style={{width:'100%',padding:'8px 12px'}}>
                    <option value="either">Any type (best opportunity)</option>
                    <option value="active">Active Geo × Travel</option>
                    <option value="transformation">Transformation Story</option>
                    <option value="emerging">Emerging Destination</option>
                  </select>
                </div>

                <div className="input-row">
                  <label>Topic or direction (optional)</label>
                  <textarea
                    value={topic}
                    onChange={e => setTopic(e.target.value)}
                    placeholder="e.g. Vietnam's travel boom&#10;e.g. Georgia after Soviet collapse"
                    style={{width:'100%'}}
                  />
                </div>

                <div className="input-row">
                  <label>Or paste headlines (if news fetch fails)</label>
                  <textarea
                    id="manual-headlines"
                    placeholder="One headline per line"
                    style={{width:'100%'}}
                  />
                </div>

                <button className="btn btn-amber" style={{padding:'12px 32px',fontSize:12,width:'100%'}} onClick={generate}>
                  Generate Article
                </button>
              </div>
            </div>
          )}

          {status !== 'idle' && (
            <div className="section-card active" style={{marginTop:0}}>
              <div className="section-header">
                <div className="sh-title">Generating Article</div>
                <span className={`sh-status ${status}`}>{status}</span>
              </div>
              <div className="section-body">
                {status === 'running' && (
                  <>
                    <div className="loading-row">
                      <div className="loading-dot" />
                      <span style={{flex:1,color:'var(--muted)',fontSize:11}}>Writing your article...</span>
                      <ElapsedTimer running={true} />
                    </div>
                    {feedStatus && (
                      <div style={{fontFamily:'IBM Plex Mono',fontSize:10,color:'var(--amber2)',marginTop:10}}>
                        {feedStatus}
                      </div>
                    )}
                  </>
                )}

                {error && (
                  <div className="error-card">
                    <p>{error}</p>
                    <button className="btn btn-ghost btn-sm" onClick={generate}>Retry</button>
                  </div>
                )}

                {output && (
                  <>
                    <div style={{fontFamily:'IBM Plex Mono',fontSize:10,color:'var(--muted)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:8}}>
                      {status === 'complete' ? 'Complete' : 'Streaming...'}
                    </div>
                    <div className="output-area" ref={outputRef}>{output}</div>
                    {status === 'complete' && (
                      <div className="controls">
                        <button className="btn btn-green btn-sm" onClick={saveIssue}>Save to Archive</button>
                        <button className="btn btn-ghost btn-sm" onClick={reset}>Start Over</button>
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          )}
        </>
      )}

      {activeTab === 'archive' && (
        <>
          {!selectedArchive ? (
            <>
              {archive.length === 0 ? (
                <div style={{textAlign:'center',padding:60,color:'var(--dim)',fontFamily:'IBM Plex Mono',fontSize:12}}>
                  No issues saved yet
                </div>
              ) : (
                <div className="archive-list">
                  {archive.map(issue => (
                    <div key={issue.id} className="archive-item" onClick={() => setSelectedArchive(issue)}>
                      <div>
                        <div className="archive-item-title">{issue.headline}</div>
                        <div className="archive-item-meta">{issue.date}</div>
                      </div>
                      <span style={{color:'var(--dim)'}}>→</span>
                    </div>
                  ))}
                </div>
              )}
            </>
          ) : (
            <>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div>
                  <h2 style={{fontFamily:'Playfair Display',fontSize:20,fontWeight:700}}>{selectedArchive.headline}</h2>
                  <div style={{fontFamily:'IBM Plex Mono',fontSize:11,color:'var(--muted)',marginTop:4}}>{selectedArchive.date}</div>
                </div>
                <button className="btn btn-ghost btn-sm" onClick={() => setSelectedArchive(null)}>← Back</button>
              </div>
              <div className="output-area" style={{maxHeight:700}}>{selectedArchive.output}</div>
            </>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
